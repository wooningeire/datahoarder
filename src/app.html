<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Averia+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Belanosima:wght@400;600;700&display=swap" rel="stylesheet" />
		<style>
			html,
			body,
			body > div {
				min-height: 100%;
			}

			body {
				margin: 0;
				background: oklch(0.97 0.015 235);
			}

			.app-boot {
				position: fixed;
				inset: 0;
				z-index: 0;
				display: grid;
				place-items: center;
				color: oklch(0.28 0.08 235);
				font-family:
					"Averia Libre",
					"Atkinson Hyperlegible Next",
					system-ui,
					sans-serif;
				background: oklch(0.97 0.015 235);
			}

			body:has(.datahoarder-shell) .app-boot {
				display: none;
			}
		</style>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="app-boot">Datahoarder</div>
		<div>%sveltekit.body%</div>
	</body>
</html>
